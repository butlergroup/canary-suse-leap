name: suse-leap Runtime Scan

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            cloud-image-utils \
            curl \
            openssh-client \
            netcat-openbsd \
            ca-certificates \
            ovmf \
            python3 \
            python3-pip \
            libxml2-utils \
            jq python3-xmltodict

      - name: Download installer ISO
        run: |
          curl -L --retry 5 -o install.iso \
            https://download.opensuse.org/distribution/leap/16.0/offline/Leap-16.0-online-installer-x86_64.install.iso

      - name: Create VM disk
        run: |
          qemu-img create -f qcow2 suse-leap.qcow2 20G

      - name: Generate SSH key
        run: |
          ssh-keygen -t rsa -b 4096 -f id_rsa -N ""

      - name: Create AutoYaST ISO
        run: |
          PUBKEY=$(cat id_rsa.pub)
          cat > autoinst.xml <<EOF
          <profile xmlns="http://www.suse.com/1.0/yast2ns">

            <general>
              <mode>
                <confirm config:type="boolean">false</confirm>
                <final_reboot config:type="boolean">true</final_reboot>
              </mode>
            </general>

            <users config:type="list">
              <user>
                <username>clouduser</username>
                <ssh_authorized_keys>
                  <ssh_authorized_key>$PUBKEY</ssh_authorized_key>
                </ssh_authorized_keys>
                <encrypted config:type="boolean">false</encrypted>
                <user_password>opensuse</user_password>
                <groups>wheel</groups>
              </user>
            </users>

            <root_password>opensuse</root_password>

            <networking>
              <keep_install_network config:type="boolean">true</keep_install_network>
            </networking>

            <services-manager>
              <default_target>multi-user</default_target>
              <services>
                <enable config:type="list">
                  <service>sshd</service>
                </enable>
              </services>
            </services-manager>

            <firewall>
              <enable_firewall config:type="boolean">false</enable_firewall>
            </firewall>

            <partitioning config:type="list">
              <drive>
                <initialize config:type="boolean">true</initialize>
                <use>all</use>
              </drive>
            </partitioning>

          </profile>
          EOF

          genisoimage -o autoinst.iso -V "OEMDRV" -J -r autoinst.xml

      - name: Extract kernel + initrd from the ISO
        run: |
          mkdir iso
          sudo mount -o loop install.iso iso
          cp iso/boot/x86_64/loader/linux .
          cp iso/boot/x86_64/loader/initrd .
          sudo umount iso

      - name: Start openSUSE installer VM
        run: |
          OVMF_CODE=$(find /usr/share -name "OVMF_CODE*.fd" | head -n 1)
          OVMF_VARS=$(find /usr/share -name "OVMF_VARS*.fd" | head -n 1)

          cp "$OVMF_VARS" ./OVMF_VARS.fd

          qemu-system-x86_64 \
            -m 4096 \
            -smp 2 \
            -machine q35,accel=tcg \
            -cpu max \
            -drive if=pflash,format=raw,readonly=on,file="$OVMF_CODE" \
            -drive if=pflash,format=raw,file=OVMF_VARS.fd \
            -drive file=suse-leap.qcow2,format=qcow2,if=virtio \
            -kernel linux \
            -initrd initrd \
            -append "install=http://download.opensuse.org/distribution/leap/16.0/repo/oss autoyast=cdrom:/autoinst.xml console=ttyS0,115200 textmode=1 rd.neednet=1" \
            -drive file=autoinst.iso,media=cdrom \
            -netdev user,id=net0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=net0 \
            -nographic \
            -serial mon:stdio \
            > vm.log 2>&1 &

          echo $! > vm.pid

      - name: Wait for SSH to be fully ready
        run: |
          for i in {1..240}; do
            if ssh -i id_rsa \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=2 \
              -o BatchMode=yes \
              -p 2222 clouduser@localhost "echo ready" >/dev/null 2>&1; then
              echo "✅ SSH is fully ready"
              exit 0
            fi
            echo "⏳ Waiting for SSH..."
            sleep 2
          done
          echo "❌ SSH failed to become ready"
          exit 1

      - name: Dump VM logs
        if: failure()
        run: cat vm.log || true

      - name: Run OpenSCAP scan inside VM
        run: |
          ssh -i id_rsa -p 2222 \
            -o StrictHostKeyChecking=no clouduser@localhost <<'EOF'
          set -e

          sudo zypper refresh
          sudo zypper install -y openscap-utils scap-security-guide

          # Find a suitable profile (SUSE content varies slightly by release)
          oscap info /usr/share/xml/scap/ssg/content/ssg-opensuse-leap-ds.xml

          sudo oscap xccdf eval \
            --profile xccdf_org.ssgproject.content_profile_standard \
            --results /tmp/openscap-results.xml \
            --report /tmp/openscap-report.html \
            /usr/share/xml/scap/ssg/content/ssg-opensuse-leap-ds.xml
          EOF

      - name: Copy OpenSCAP results
        run: |
          scp -i id_rsa -P 2222 \
            clouduser@localhost:/tmp/openscap-results.xml \
            openscap-results.xml

      - name: Convert OpenSCAP results to SARIF
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          import json

          tree = ET.parse('openscap-results.xml')
          root = tree.getroot()

          sarif = {
            "version": "2.1.0",
            "runs": [{
              "tool": {
                "driver": {
                  "name": "openscap",
                  "informationUri": "https://www.open-scap.org"
                }
              },
              "results": []
            }]
          }

          for rule in root.findall(".//{http://checklists.nist.gov/xccdf/1.2}rule-result"):
              result = rule.find("{http://checklists.nist.gov/xccdf/1.2}result")
              if result is None:
                  continue

              status = result.text
              if status not in ["fail", "error"]:
                  continue

              sarif["runs"][0]["results"].append({
                  "ruleId": rule.get("idref"),
                  "level": "error",
                  "message": {
                      "text": f"OpenSCAP failure: {rule.get('idref')}"
                  }
              })

          with open("report-scap.sarif", "w") as f:
              json.dump(sarif, f, indent=2)
          EOF

      - name: Run Trivy scan inside VM
        run: |
          ssh -i id_rsa -p 2222 clouduser@localhost <<'EOF'
          set -e
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
          sudo ./bin/trivy rootfs / \
            --scanners vuln,misconfig \
            -f sarif \
            -o /tmp/report.sarif
          EOF

      - name: Copy Trivy report from VM
        run: |
          scp -i id_rsa -P 2222 \
            -o StrictHostKeyChecking=no \
            clouduser@localhost:/tmp/report.sarif \
            report.sarif

      - name: Stop VM
        if: always()
        run: |
          kill $(cat vm.pid) || true

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: report.sarif

      - name: Upload OpenSCAP SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: report-scap.sarif
