name: suse-leap Runtime Scan

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            cloud-image-utils \
            curl \
            libguestfs-tools \
            guestmount \
            netcat-openbsd \
            ca-certificates ovmf 

      - name: Download installer ISO
        run: |
          curl -L --retry 5 -o install.iso \
            https://download.opensuse.org/distribution/leap/16.0/offline/Leap-16.0-online-installer-x86_64.install.iso

      - name: Create VM disk
        run: |
          qemu-img create -f qcow2 suse-leap.qcow2 20

      - name: Create AutoYaST ISO
        run: |
          cat > autoinst.xml <<EOF
          <profile xmlns="http://www.suse.com/1.0/yast2ns">

            <general>
              <mode>
                <confirm config:type="boolean">false</confirm>
                <final_reboot config:type="boolean">true</final_reboot>
              </mode>
            </general>

            <users config:type="list">
              <user>
                <username>clouduser</username>
                <encrypted config:type="boolean">false</encrypted>
                <user_password>opensuse</user_password>
                <groups>wheel</groups>
              </user>
            </users>

            <root_password>opensuse</root_password>

            <networking>
              <keep_install_network config:type="boolean">true</keep_install_network>
            </networking>

            <partitioning config:type="list">
              <drive>
                <initialize config:type="boolean">true</initialize>
                <use>all</use>
              </drive>
            </partitioning>

          </profile>
          EOF

          genisoimage -o autoinst.iso -V "AUTOYAST" -J -r autoinst.xml

      - name: Extract kernel + initrd from the ISO
        run: |
          mkdir iso
          sudo mount -o loop install.iso iso
          cp iso/boot/x86_64/loader/linux .
          cp iso/boot/x86_64/loader/initrd .
          sudo umount iso

      - name: Start openSUSE installer VM
        run: |
          OVMF_CODE=$(find /usr/share -name "OVMF_CODE*.fd" | head -n 1)
          OVMF_VARS=$(find /usr/share -name "OVMF_VARS*.fd" | head -n 1)

          cp "$OVMF_VARS" ./OVMF_VARS.fd

          qemu-system-x86_64 \
            -m 4096 \
            -smp 2 \
            -machine q35,accel=tcg \
            -cpu max \
            -drive if=pflash,format=raw,readonly=on,file="$OVMF_CODE" \
            -drive if=pflash,format=raw,file=OVMF_VARS.fd \
            -drive file=suse-leap.qcow2,format=qcow2,if=virtio \
            -drive file=install.iso,media=cdrom \
            -kernel linux \
            -initrd initrd \
            -append "install=cdrom autoyast=device://LABEL=AUTOYAST/autoinst.xml console=ttyS0,115200 rd.neednet=1 rd.debug" \
            -drive file=autoinst.iso,if=ide,media=cdrom \
            -netdev user,id=net0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=net0 \
            -nographic \
            -serial mon:stdio \
            > vm.log 2>&1 &

          echo $! > vm.pid

      - name: Wait for installation to complete
        run: |
          for i in {1..120}; do
            echo "⏳ Waiting for installation to complete..."
            sleep 2
          done
          echo "✅ Wait step complete."

      - name: Dump VM logs
        run: cat vm.log || true

      - name: Stop VM
        if: always()
        run: |
          kill $(cat vm.pid) || true

      - name: Mount qcow2 image
        run: |
          sudo mkdir -p /mnt/suse-root

          # Inspect partitions (useful for debugging)
          sudo virt-filesystems -a suse-leap.qcow2 --all --long -h

          # Mount the root filesystem (usually /dev/sda2 or similar)
          sudo guestmount -a suse-leap.qcow2 -i --ro /mnt/suse-root

      - name: Run Trivy scan (offline rootfs)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh

          sudo ./bin/trivy rootfs /mnt/suse-root \
            --scanners vuln,misconfig \
            -f sarif \
            -o report.sarif

      - name: Unmount qcow2
        if: always()
        run: |
          sudo guestunmount /mnt/suse-root || true

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: report.sarif
