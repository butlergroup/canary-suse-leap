name: suse-leap Runtime Scan

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            cloud-image-utils \
            curl \
            libguestfs-tools \
            guestmount \
            netcat-openbsd \
            ca-certificates  

      - name: Download openSUSE qcow2 image
        run: |
          curl -L -o suse-leap.qcow2 \
            https://download.opensuse.org/distribution/leap/16.0/appliances/Leap-16.0-Minimal-VM.x86_64-kvm-and-xen.qcow2

      - name: Mount qcow2 image
        run: |
          sudo mkdir -p /mnt/suse-root
          sudo guestmount -a suse-leap.qcow2 -i --ro /mnt/suse-root

      - name: Run Trivy scan (offline rootfs)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh

          sudo ./bin/trivy rootfs /mnt/suse-root \
            --scanners vuln,misconfig \
            -f sarif \
            -o report.sarif

      - name: Unmount qcow2
        if: always()
        run: |
          sudo guestunmount /mnt/suse-root || true

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: report.sarif
